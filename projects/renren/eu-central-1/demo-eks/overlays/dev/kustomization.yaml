apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: renren-dev

resources:
- ../../base
- namespace.yaml
- logging.yaml
- pvpvc.yaml

commonLabels:
  env: dev
  project: renren

configMapGenerator:
- name: project-configmap
  behavior: merge
  envs:
  - project-configmap.txt

secretGenerator:
- name: project-secrets
  behavior: merge
  envs:
  - project-secrets.txt
  type: Opaque