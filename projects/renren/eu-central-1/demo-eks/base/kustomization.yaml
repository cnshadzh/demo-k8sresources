apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- configmap.yaml
- secret.yaml

commonLabels:
  project: ideas

configMapGenerator:
- name: project-configmap
  behavior: merge
  envs:
  - project-configmap.txt

secretGenerator:
- name: project-secrets
  behavior: merge
  envs:
  - project-secrets.txt
  type: Opaque
