apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: renren-fast-vue-hpa
spec:
  behavior:
    scaleDown:
      policies:
      - periodSeconds: 600
        type: Pods
        value: 5
      selectPolicy: Max
      stabilizationWindowSeconds: 300
    scaleUp:
      policies:
      - periodSeconds: 60
        type: Pods
        value: 5
      - periodSeconds: 60
        type: Percent
        value: 100
      selectPolicy: Max
      stabilizationWindowSeconds: 0
  metrics:
  - resource:
      name: cpu
      target:
        averageUtilization: 70
        type: Utilization
    type: Resource
  maxReplicas: 1
  minReplicas: 1  
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: renren-fast-vue