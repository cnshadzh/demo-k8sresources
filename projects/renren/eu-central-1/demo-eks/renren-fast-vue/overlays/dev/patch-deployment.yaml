apiVersion: apps/v1
kind: Deployment
metadata:
  name: renren-fast-vue
spec:
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    spec:
      containers:
      - env:
        - name: APP_ENV
          value: dev
        - name: APP_MAX_CPU_QUOTA
          valueFrom:
            resourceFieldRef:
              containerName: renren-fast-vue
              resource: limits.cpu
        - name: APP_MAX_MEMORY_QUOTA
          valueFrom:
            resourceFieldRef:
              containerName: renren-fast-vue
              resource: limits.memory
        - name: APP_MIN_CPU_QUOTA
          valueFrom:
            resourceFieldRef:
              containerName: renren-fast-vue
              resource: requests.cpu
        - name: APP_MIN_MEMORY_QUOTA
          valueFrom:
            resourceFieldRef:
              containerName: renren-fast-vue
              resource: requests.memory
        envFrom:
        - configMapRef:
            name: project-configmap
            optional: true
        - secretRef:
            name: project-secrets
            optional: true
        - configMapRef:
            name: renren-fast-vue-configmap
            optional: false
        - secretRef:
            name: renren-fast-vue-secrets
            optional: false
        name: renren-fast-vue
        resources:
          limits:
            cpu: "1"
            memory: 1024Mi
          requests:
            cpu: "0.5"
            memory: 512Mi
        volumeMounts:
        - mountPath: /init
          name: init-volume
        - mountPath: /efs
          name: efs-volume
      serviceAccount: renren-fast-vue-sa
      serviceAccountName: renren-fast-vue-sa
      nodeSelector:
        project: renren
      volumes:
      - name: init-volume
        emptyDir: {}
      - name: efs-volume
        persistentVolumeClaim:
          readOnly: true
          claimName: renren-efs-claim
      - configMap:
          defaultMode: 420
          name: renren-fast-vue-configuration
          optional: true
        name: app-configuration
      - configMap:
          defaultMode: 420
          name: renren-fast-vue-configmap
        name: app-configmap
      - secret:
          defaultMode: 420
          secretName: renren-fast-vue-secrets
        name: app-secrets
      - secret:
          defaultMode: 420
          secretName: renren-fast-vue-secret-files
          optional: true
        name: app-secret-files
      - configMap:
          defaultMode: 420
          name: project-configmap
          optional: true
        name: project-configmap
      - secret:
          defaultMode: 420
          secretName: project-secrets
          optional: true
        name: project-secrets
