apiVersion: v1
kind: Service
metadata:
  name: renren-fast-vue
spec:
  ports:
  - name: metrics
    port: 8000
    protocol: TCP
    targetPort: 8000
  - name: http-80
    port: 80
    protocol: TCP
    targetPort: 8080
  - name: grpc-9090
    port: 9090
    protocol: TCP
    targetPort: 9090
  selector:
    app: renren-fast-vue
    stage: release
  sessionAffinity: None
  type: ClusterIP
