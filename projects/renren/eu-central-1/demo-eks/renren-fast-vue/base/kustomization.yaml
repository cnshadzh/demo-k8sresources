apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- app-rolebinding.yaml
- deployment.yaml
- configmap.yaml
- secret.yaml
- svc.yaml

commonLabels:
  app: renren-fast-vue
  monitor: "true"
  project: renren
  stage: release

configMapGenerator:
- name: renren-fast-vue-configmap
  behavior: merge
  envs:
  - app-configmap.txt
- name: renren-fast-vue-configuration
  behavior: merge
  files:
  - application.yaml

secretGenerator:
- name: renren-fast-vue-secrets
  behavior: merge
  envs:
  - app-secrets.txt
  type: Opaque
