apiVersion: apps/v1
kind: Deployment
metadata:
  name: renren-fast
  annotations:
    reloader.stakater.com/search: "true"
spec:
  minReadySeconds: 20
  progressDeadlineSeconds: 600
  revisionHistoryLimit: 10
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: renren-fast
              topologyKey: kubernetes.io/hostname
            weight: 100
      containers:
      - env:
        - name: APP_NAME
          value: renren-fast
        - name: APP_REGION
          value: eu-central-1
        - name: APP_K8S_CLUSTER_ID
          value: "dev-demo-eks"
        - name: APP_CLUSTER_SEQUENCE
          value: "1"
        - name: APP_NODE_NAME
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: spec.nodeName
        - name: APP_NODE_IP
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: status.hostIP
        - name: APP_POD_NAME
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.name
        - name: APP_POD_NAMESPACE
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.namespace
        - name: APP_POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: APP_SERVICE_ACCOUNT
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: spec.serviceAccountName
        image: 984601295324.dkr.ecr.eu-central-1.amazonaws.com/renren/renren-fast
        imagePullPolicy: IfNotPresent
        name: renren-fast
        ports:
        - containerPort: 8000
          name: metrics
          protocol: TCP
        - containerPort: 8080
          name: http-8080
          protocol: TCP
        - containerPort: 9090
          name: grpc-9090
          protocol: TCP
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /actuator/health
            port: 8000
            scheme: HTTP
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 2
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /actuator/health
            port: 8000
            scheme: HTTP
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 2
        startupProbe:
          failureThreshold: 30
          httpGet:
            path: /actuator/health
            port: 8000
            scheme: HTTP
          periodSeconds: 10
        terminationMessagePath: /opt/log/terminationMessages
        terminationMessagePolicy: File
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
      volumes: []
